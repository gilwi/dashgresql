{% macro navbar(current_user) %}
<nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <!-- LEFT SIDE: Logo & Primary Links -->
            <div class="flex">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a
                        href="{{ url_for('main.index') }}"
                        class="text-xl font-bold text-indigo-600"
                    >
                        Dashgresql
                    </a>
                </div>

                <!-- Primary Navigation Links (Hidden on mobile) -->
                <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                    <!-- Home Link (Active state logic included) -->
                    <a
                        href="{{ url_for('main.index') }}"
                        class="{% if request.endpoint == 'main.index' %}border-indigo-500 text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium"
                    >
                        Home
                    </a>

                    <!-- Add other links here following the same pattern -->
                </div>
            </div>

            <!-- RIGHT SIDE: User Actions -->
            <div class="hidden sm:ml-6 sm:flex sm:items-center">
                {% if current_user.is_anonymous %}
                <a
                    href="{{ url_for('main.login') }}"
                    class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition"
                >
                    Login
                </a>
                {% else %}
                <!-- Profile Link -->
                <a
                    href="{{ url_for('main.user', username=current_user.username) }}"
                    class="text-gray-500 hover:text-gray-700 text-sm font-medium mr-4"
                >
                    Profile
                </a>
                <!-- Logout Button -->
                <a
                    href="{{ url_for('main.logout') }}"
                    class="px-3 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition"
                >
                    Logout
                </a>
                {% endif %}
            </div>

            <!-- MOBILE MENU BUTTON (Hamburger) -->
            <div class="flex items-center sm:hidden">
                <button
                    type="button"
                    id="mobile-menu-button"
                    class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500"
                    aria-controls="mobile-menu"
                    aria-expanded="false"
                >
                    <span class="sr-only">Open main menu</span>
                    <!-- Icon: Menu (visible when closed) -->
                    <svg
                        class="block h-6 w-6"
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        aria-hidden="true"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"
                        />
                    </svg>
                    <!-- Icon: X (visible when open) -->
                    <svg
                        class="hidden h-6 w-6"
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        aria-hidden="true"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M6 18L18 6M6 6l12 12"
                        />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- MOBILE MENU (Hidden by default) -->
    <div class="sm:hidden hidden" id="mobile-menu">
        <div class="pt-2 pb-3 space-y-1">
            <!-- Mobile Home Link -->
            <a
                href="{{ url_for('main.index') }}"
                class="{% if request.endpoint == 'main.index' %}bg-indigo-50 border-indigo-500 text-indigo-700{% else %}border-transparent text-gray-500 hover:bg-gray-50 hover:border-gray-300 hover:text-gray-700{% endif %} block pl-3 pr-4 py-2 border-l-4 text-base font-medium"
            >
                Home
            </a>
        </div>

        <!-- Mobile User Section -->
        <div class="pt-4 pb-3 border-t border-gray-200">
            {% if current_user.is_anonymous %}
            <div class="space-y-1">
                <a
                    href="{{ url_for('main.login') }}"
                    class="block pl-3 pr-4 py-2 text-base font-medium text-indigo-600 hover:text-indigo-800"
                >
                    Login
                </a>
            </div>
            {% else %}
            <div class="flex items-center px-4">
                <div class="text-base font-medium text-gray-800">
                    {{ current_user.username }}
                </div>
            </div>
            <div class="mt-3 space-y-1">
                <a
                    href="{{ url_for('main.user', username=current_user.username') }}"
                    class="block pl-3 pr-4 py-2 text-base font-medium text-gray-500 hover:text-gray-800 hover:bg-gray-100"
                >
                    Profile
                </a>
                <a
                    href="{{ url_for('main.logout') }}"
                    class="block pl-3 pr-4 py-2 text-base font-medium text-gray-500 hover:text-gray-800 hover:bg-gray-100"
                >
                    Logout
                </a>
            </div>
            {% endif %}
        </div>
    </div>
</nav>
{% endmacro %}
